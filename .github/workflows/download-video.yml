name: Download Video

# Disparado externamente via API (repository_dispatch), não por push/PR.
# O n8n/Zapier chama a API do GitHub pra acionar isso.
on:
  repository_dispatch:
    types: [download-video]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js (necessário pro provider de PO Token do yt-dlp)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar ffmpeg e dependências
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install --no-cache-dir yt-dlp cloudinary requests bgutil-ytdlp-pot-provider

      - name: Clonar e iniciar o servidor de PO Token (bgutil)
        run: |
          git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /home/runner/bgutil-ytdlp-pot-provider
          cd /home/runner/bgutil-ytdlp-pot-provider/server
          npm install
          echo "── package.json (pra ver os nomes reais dos scripts) ──"
          cat package.json
          echo "── Tentando compilar (cascata de nomes comuns) ──"
          npm run build || npm run compile || npx tsc -p . || echo "Nenhum comando de build padrão funcionou — seguindo assim mesmo pra diagnóstico."
          echo "── Arquivos .js encontrados depois do build ──"
          find . -maxdepth 3 -name "*.js" | grep -v node_modules | head -30
          echo "── Tentando iniciar o servidor ──"
          (node build/main.js > /tmp/pot-server.log 2>&1 &) 
          sleep 3
          echo "── Log do servidor ──"
          cat /tmp/pot-server.log || echo "sem log ainda"

      - name: Baixar vídeo e subir pro Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          VIDEO_URL: ${{ github.event.client_payload.url }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          JOB_ID: ${{ github.event.client_payload.job_id }}
          METADATA_JSON: ${{ toJson(github.event.client_payload.metadata) }}
        run: python download.py
